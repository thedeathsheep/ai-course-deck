<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F9FBFF"/>
      <stop offset="100%" stop-color="#EEF4FF"/>
    </linearGradient>
    <linearGradient id="searchPanel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F5F8FF"/>
    </linearGradient>
    <linearGradient id="aiPanel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F7FAFF"/>
      <stop offset="100%" stop-color="#EAF1FF"/>
    </linearGradient>
    <linearGradient id="pill" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4F7CFF"/>
      <stop offset="100%" stop-color="#7BB5FF"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="26" flood-color="#6489D6" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="190" cy="130" r="160" fill="#DCE8FF" opacity="0.9"/>
  <circle cx="1440" cy="160" r="150" fill="#D9F6F0" opacity="0.65"/>

  <rect x="84" y="84" width="1432" height="732" rx="36" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="122" y="122" width="228" height="40" rx="20" fill="#EDF3FF"/>
  <text x="152" y="148" font-family="'Microsoft YaHei UI', sans-serif" font-size="18" font-weight="700" fill="#4B679A">认知翻转</text>

  <text x="122" y="214" font-family="Georgia, serif" font-size="40" font-weight="700" fill="#162033">搜索在找资料</text>
  <text x="122" y="266" font-family="Georgia, serif" font-size="40" font-weight="700" fill="#4F7CFF">AI 在推进任务</text>

  <rect x="122" y="326" width="570" height="346" rx="30" fill="url(#searchPanel)" stroke="#D8E4FC" stroke-width="2"/>
  <rect x="724" y="326" width="670" height="346" rx="30" fill="url(#aiPanel)" stroke="#D8E4FC" stroke-width="2"/>
  <rect x="122" y="694" width="1272" height="82" rx="24" fill="#F4F8FF" stroke="#DCE8FF" stroke-width="2"/>

  <rect x="160" y="360" width="112" height="40" rx="20" fill="#E8EFFD"/>
  <text x="193" y="386" font-family="'Microsoft YaHei UI', sans-serif" font-size="20" font-weight="700" fill="#627497">搜索</text>
  <rect x="762" y="360" width="96" height="40" rx="20" fill="url(#pill)"/>
  <text x="795" y="386" font-family="'Microsoft YaHei UI', sans-serif" font-size="20" font-weight="700" fill="#FFFFFF">AI</text>

  <g font-family="'Microsoft YaHei UI', sans-serif" font-size="24">
    <text x="160" y="448" fill="#6A7C9F" font-weight="700">核心目标</text>
    <text x="316" y="448" fill="#162033">找到已有信息</text>
    <text x="762" y="448" fill="#6A7C9F" font-weight="700">核心目标</text>
    <text x="918" y="448" fill="#162033">完成任务，先产出一个可修改版本</text>

    <text x="160" y="520" fill="#6A7C9F" font-weight="700">输入方式</text>
    <text x="316" y="520" fill="#162033">关键词、问题、网页入口</text>
    <text x="762" y="520" fill="#6A7C9F" font-weight="700">输入方式</text>
    <text x="918" y="520" fill="#162033">目标、背景、约束、格式、示例</text>

    <text x="160" y="592" fill="#6A7C9F" font-weight="700">输出形态</text>
    <text x="316" y="592" fill="#162033">链接、网页、资料列表</text>
    <text x="762" y="592" fill="#6A7C9F" font-weight="700">输出形态</text>
    <text x="918" y="592" fill="#162033">草稿、结构、方案、脚本、代码</text>
  </g>

  <g transform="translate(1256 354)">
    <rect width="102" height="102" rx="28" fill="#FFFFFF" stroke="#D8E4FC" stroke-width="2"/>
    <path d="M28 54 C44 24, 78 24, 74 58 C72 82, 42 88, 28 54Z" fill="#4F7CFF" opacity="0.18"/>
    <path d="M34 58 C46 36, 68 36, 66 60 C64 76, 42 78, 34 58Z" fill="#4F7CFF"/>
    <circle cx="50" cy="58" r="6" fill="#FFFFFF"/>
    <circle cx="59" cy="58" r="6" fill="#FFFFFF"/>
  </g>

  <text x="166" y="748" font-family="'Microsoft YaHei UI', sans-serif" font-size="28" font-weight="700" fill="#162033">
    一句话：搜索更像资料入口，AI 更像任务接口。你的角色从“找答案”转向“定义任务和校验结果”。
  </text>
</svg>

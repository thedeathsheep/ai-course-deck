<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FBFDFF"/>
      <stop offset="100%" stop-color="#EEF4FF"/>
    </linearGradient>
    <linearGradient id="stepA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4F7CFF"/>
      <stop offset="100%" stop-color="#7CB2FF"/>
    </linearGradient>
    <linearGradient id="stepB" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#75C9FF"/>
      <stop offset="100%" stop-color="#95D6FF"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#6489D6" flood-opacity="0.13"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="152" cy="132" r="146" fill="#E4EEFF"/>
  <circle cx="1460" cy="138" r="138" fill="#DFF8F2"/>

  <rect x="110" y="134" width="1380" height="580" rx="40" fill="#FFFFFF" filter="url(#shadow)"/>
  <text x="156" y="214" font-family="Georgia, serif" font-size="38" font-weight="700" fill="#162033">提示词五步法</text>
  <text x="156" y="258" font-family="'Microsoft YaHei UI', sans-serif" font-size="24" fill="#617393">把“问一句试试”升级成“先定义任务，再逐步收敛”。</text>

  <g font-family="'Microsoft YaHei UI', sans-serif">
    <path d="M270 414 H 452" stroke="#BFD2FF" stroke-width="10" stroke-linecap="round"/>
    <path d="M558 414 H 740" stroke="#BFD2FF" stroke-width="10" stroke-linecap="round"/>
    <path d="M846 414 H 1028" stroke="#BFD2FF" stroke-width="10" stroke-linecap="round"/>
    <path d="M1134 414 H 1316" stroke="#BFD2FF" stroke-width="10" stroke-linecap="round"/>

    <g transform="translate(154 292)">
      <rect width="132" height="132" rx="34" fill="url(#stepA)"/>
      <text x="54" y="78" font-size="44" font-weight="700" fill="#FFFFFF">1</text>
      <text x="-8" y="188" font-size="28" font-weight="700" fill="#162033">定义任务</text>
      <text x="-6" y="228" font-size="21" fill="#617393">目标、对象、限制</text>
    </g>

    <g transform="translate(442 292)">
      <rect width="132" height="132" rx="34" fill="url(#stepB)"/>
      <text x="54" y="78" font-size="44" font-weight="700" fill="#FFFFFF">2</text>
      <text x="-10" y="188" font-size="28" font-weight="700" fill="#162033">给上下文</text>
      <text x="-18" y="228" font-size="21" fill="#617393">材料、示例、背景</text>
    </g>

    <g transform="translate(730 292)">
      <rect width="132" height="132" rx="34" fill="url(#stepA)"/>
      <text x="54" y="78" font-size="44" font-weight="700" fill="#FFFFFF">3</text>
      <text x="4" y="188" font-size="28" font-weight="700" fill="#162033">出首版</text>
      <text x="-36" y="228" font-size="21" fill="#617393">先拿一个能工作的版本</text>
    </g>

    <g transform="translate(1018 292)">
      <rect width="132" height="132" rx="34" fill="url(#stepB)"/>
      <text x="54" y="78" font-size="44" font-weight="700" fill="#FFFFFF">4</text>
      <text x="-20" y="188" font-size="28" font-weight="700" fill="#162033">追问迭代</text>
      <text x="-40" y="228" font-size="21" fill="#617393">比较、压缩、改写、追问</text>
    </g>

    <g transform="translate(1306 292)">
      <rect width="132" height="132" rx="34" fill="url(#stepA)"/>
      <text x="54" y="78" font-size="44" font-weight="700" fill="#FFFFFF">5</text>
      <text x="-18" y="188" font-size="28" font-weight="700" fill="#162033">核验落地</text>
      <text x="-44" y="228" font-size="21" fill="#617393">查事实、试使用、做修改</text>
    </g>
  </g>

  <rect x="214" y="770" width="1172" height="76" rx="24" fill="#F4F8FF" stroke="#D8E4FC" stroke-width="2"/>
  <text x="266" y="818" font-family="'Microsoft YaHei UI', sans-serif" font-size="28" font-weight="700" fill="#162033">
    重点不是写复杂 prompt，而是让模型少猜一点、让你返工少一点。
  </text>
</svg>
